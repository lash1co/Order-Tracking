apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-tracking-api
  namespace: order-tracking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-tracking-api
  template:
    metadata:
      labels:
        app: order-tracking-api
    spec:
      containers:
        - name: api
          image: order-tracking-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-tracking-config
            - secretRef:
                name: order-tracking-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-tracking-api
  namespace: order-tracking
spec:
  selector:
    app: order-tracking-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-tracking-api
  namespace: order-tracking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-tracking-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
