apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-tracking-ui
  namespace: order-tracking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-tracking-ui
  template:
    metadata:
      labels:
        app: order-tracking-ui
    spec:
      containers:
        - name: ui
          image: order-tracking-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-tracking-ui
  namespace: order-tracking
spec:
  selector:
    app: order-tracking-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-tracking-ui
  namespace: order-tracking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-tracking-ui
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
