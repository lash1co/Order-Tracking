apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-tracking-api
  namespace: {{ include "order-tracking.namespace" . }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: order-tracking-api
  template:
    metadata:
      labels:
        app: order-tracking-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: order-tracking-config
            - secretRef:
                name: order-tracking-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: order-tracking-api
  namespace: {{ include "order-tracking.namespace" . }}
spec:
  selector:
    app: order-tracking-api
  ports:
    - port: 8080
      targetPort: 8080
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-tracking-api
  namespace: {{ include "order-tracking.namespace" . }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-tracking-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.cpuUtilization }}
{{- end }}
